<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grover N=4 — Explorador de Circuito Cuántico | UNLP</title>
<meta name="description" content="Explorador visual interactivo del algoritmo de Grover para el problema de N-Reinas (N=4). Codificación por columna, oráculo basado en enumeración de patrones. UNLP - Introducción a Arq. Comp. Cuánticas.">
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Paleta del PDF — navy → teal → turquesa + acento cálido ── */
  --bg: #F5F0E8;
  --surf: #FFFFFF;
  --surf2: #EDE9DF;
  --border: rgba(13,58,74,0.12);
  --text: #1A3A4A;
  --dim: #6B8A8E;

  /* ── Zona Navy (fríos oscuros — tiles oscuros del PDF) ── */
  --root: #0B1D2E;
  --diffuser: #14324A;
  --X: #1E3D5C;
  --MCX: #2A5278;

  /* ── Zona Teal (el color "N-Reinas" del PDF) ── */
  --H: #0D7377;
  --oracle: #0B6B6F;
  --compute: #0E8C83;
  --pair: #0F9E90;

  /* ── Zona Turquesa (tiles brillantes del PDF) ── */
  --iteration: #15B899;
  --accent: #15B899;
  --measure: #20A89A;
  --phase: #2EC4B6;
  --uncompute: #4DD8C0;

  /* ── Acento cálido (del beige del PDF, para énfasis) ── */
  --conflict: #C8930F;
  --gold: #C8930F;

  /* ── Neutro ── */
  --I: #4A6A72;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:linear-gradient(135deg,#FFFFFF 0%,#F5F0E8 50%,#EDE9DF 100%);border-bottom:1px solid var(--border);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.htitle h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#1A3A4A,#0D7377,#15B899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.htitle p{color:var(--dim);font-size:.78rem;margin-top:.2rem;font-family:'JetBrains Mono',monospace}
.hstats{display:flex;gap:1.5rem;flex-wrap:wrap}
.sp{display:flex;flex-direction:column;align-items:center}
.sp .v{font-size:1.1rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.sp .l{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:.1rem}

/* BREADCRUMB */
.bc{background:var(--surf);border-bottom:1px solid var(--border);padding:.6rem 2rem;display:flex;align-items:center;gap:.4rem;font-size:.82rem;overflow-x:auto;white-space:nowrap}
.bci{display:inline-flex;align-items:center;gap:.4rem;cursor:pointer;color:var(--dim);padding:.2rem .5rem;border-radius:6px;transition:all .2s}
.bci:hover{color:var(--text);background:rgba(13,115,119,0.1)}
.bci.active{color:var(--text);font-weight:600;pointer-events:none}
.bcs{color:var(--dim);opacity:.4}

/* WIRE VIEW */
.wire-section{background:var(--surf);border-bottom:1px solid var(--border);padding:.75rem 2rem;overflow-x:auto}
.wire-label-row{font-size:.65rem;text-transform:uppercase;letter-spacing:.15em;color:var(--dim);margin-bottom:.5rem}
.wires{display:flex;flex-direction:column;gap:3px;min-width:fit-content}
.wire-row{display:flex;align-items:center;height:22px}
.wname{width:55px;min-width:55px;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--dim);text-align:right;padding-right:8px;flex-shrink:0}
.wtrack{flex:1;min-width:600px;height:2px;background:rgba(13,115,119,0.1);position:relative;border-radius:1px}
.wtrack.active{background:rgba(13,115,119,0.3)}
.wgates{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;display:flex;align-items:center;height:20px}
.wgate{position:absolute;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-family:'JetBrains Mono',monospace;font-weight:600;color:#fff;cursor:pointer;transition:filter .2s;white-space:nowrap;padding:0 6px;overflow:hidden;text-overflow:ellipsis;min-width:40px}
.wgate:hover{filter:brightness(1.3)}

/* MAIN */
.main{padding:1.25rem 2rem;max-width:1400px;margin:0 auto}

/* INFO PANEL */
.ipanel{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1.25rem;display:flex;gap:1.2rem;align-items:flex-start}
.ibadge{width:44px;height:44px;min-width:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.iname{font-size:1rem;font-weight:600;margin-bottom:.2rem}
.idesc{font-size:.82rem;color:var(--dim);line-height:1.6}
.istats{display:flex;gap:.6rem;margin-top:.7rem;flex-wrap:wrap}
.istat{background:rgba(13,115,119,0.06);border:1px solid var(--border);border-radius:6px;padding:.2rem .55rem;font-size:.7rem;font-family:'JetBrains Mono',monospace}

/* EXPLANATION BOX */
.expl-box{background:linear-gradient(135deg,rgba(13,115,119,0.10),rgba(21,184,153,0.05));border:1px solid rgba(13,115,119,0.2);border-left:3px solid var(--accent);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1.25rem;font-size:.84rem;line-height:1.7;color:var(--text)}
.expl-box .expl-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);margin-bottom:.5rem;font-weight:600;font-family:'JetBrains Mono',monospace}
.expl-box em{color:var(--gold);font-style:normal;font-weight:500}
.expl-box code,.biblio-box code{background:rgba(13,58,74,0.08);padding:.1rem .35rem;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--text)}

/* GRID */
.section-hdr{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--dim);margin-bottom:.9rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.9rem}

/* GATE CARD */
.gcard{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;transition:all .2s;position:relative;overflow:hidden}
.gcard:not(.leaf){cursor:pointer}
.gcard:not(.leaf):hover{transform:translateY(-2px);border-color:rgba(26,58,74,0.25);box-shadow:0 8px 30px rgba(0,0,0,0.1)}
.gcard::after{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity .2s;pointer-events:none}
.gcard:not(.leaf):hover::after{opacity:1}
.ctop{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.cicon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.carr{font-size:.9rem;color:var(--dim);transition:transform .2s}
.gcard:not(.leaf):hover .carr{transform:translateX(3px);color:var(--text)}
.cname{font-size:.88rem;font-weight:600;font-family:'JetBrains Mono',monospace;margin-bottom:.2rem;line-height:1.3}
.csub{font-size:.72rem;color:var(--dim);margin-bottom:.65rem;line-height:1.4}
.cqubits{display:flex;flex-wrap:wrap;gap:.3rem}
.qbadge{font-size:.62rem;font-family:'JetBrains Mono',monospace;padding:.12rem .35rem;border-radius:4px;border:1px solid;opacity:.85}

/* LEAF DETAIL */
.dpanel{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin-top:1.25rem}
.dpanel h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--dim);margin-bottom:.9rem}
.gatelist{display:flex;flex-wrap:wrap;gap:.4rem}
.gpill{background:rgba(13,115,119,0.06);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;font-size:.75rem;font-family:'JetBrains Mono',monospace}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:rgba(13,115,119,0.08);border:1px solid var(--border);border-radius:8px;padding:.4rem .9rem;cursor:pointer;font-size:.82rem;color:var(--dim);transition:all .2s;margin-bottom:1rem}
.back-btn:hover{color:var(--text);background:rgba(13,115,119,0.15)}

/* PROB DISPLAY */
.prob-box{margin-top:1rem;padding:.9rem;background:rgba(0,0,0,.3);border-radius:8px}
.prob-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.5rem;font-size:.78rem;font-family:'JetBrains Mono',monospace}
.prob-lbl{width:130px;white-space:nowrap}
.prob-track{flex:1;height:6px;background:rgba(13,115,119,0.1);border-radius:3px;overflow:hidden}
.prob-fill{height:100%;border-radius:3px}

/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .22s ease forwards}

/* QUBIT LEGEND */
.qlegend{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1.25rem}
.qlegend .ql-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);margin-bottom:.7rem;font-weight:600;font-family:'JetBrains Mono',monospace}
.qlegend .ql-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.5rem}
.ql-item{display:flex;align-items:center;gap:.6rem;font-size:.78rem;padding:.35rem .5rem;border-radius:6px;background:rgba(13,115,119,0.04)}
.ql-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ql-name{font-family:'JetBrains Mono',monospace;font-weight:600;min-width:28px}
.ql-desc{color:var(--dim);font-size:.72rem}

/* ACTION BUTTONS & MODAL */
.run-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;

  cursor: pointer;
  transition: opacity 0.2s;
}
.run-btn:hover { opacity: 0.8; }
.run-btn:disabled { background: var(--dim); cursor: not-allowed; }

#result-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999;
  align-items: center; justify-content: center; padding: 2rem;
}
.modal-content {
  background: var(--surf); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 800px; max-height: 80vh; display: flex; flex-direction: column;
}
.modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 1.5rem; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; white-space: pre-wrap; color: var(--text); }
.close-modal { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 1.2rem; }

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:1.25rem 0}

/* BIBLIO SECTION */
.biblio-box{background:rgba(13,115,119,0.06);border:1px solid rgba(13,115,119,0.2);border-left:3px solid var(--gold);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1.25rem;font-size:.82rem;line-height:1.65;color:var(--text)}
.biblio-box .biblio-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--gold);margin-bottom:.5rem;font-weight:600;font-family:'JetBrains Mono',monospace}
.biblio-box .ref{color:var(--dim);font-size:.75rem;font-style:italic;margin-top:.6rem;line-height:1.5}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(13,115,119,.2);border-radius:3px}

@media(max-width:700px){
  header{flex-direction:column;padding:1rem;gap:1rem}
  .htitle h1{font-size:1.1rem}
  .hstats{gap:.8rem;justify-content:center}
  .sp .v{font-size:.9rem}
  .main{padding:.8rem 1rem}
  .grid{grid-template-columns:1fr}
  .ipanel{flex-direction:column;gap:.7rem}
  .ibadge{width:36px;height:36px;min-width:36px}
  .expl-box,.biblio-box,.qlegend{padding:.8rem 1rem;font-size:.78rem}
  .bc{padding:.4rem 1rem;font-size:.75rem}
  .wire-section{padding:.5rem 1rem}
  .wtrack{min-width:400px}
  .ql-grid{grid-template-columns:1fr}
  .run-btn{font-size:.7rem;padding:.4rem .7rem}
  .modal-content{max-width:95vw}
  .prob-lbl{width:90px;font-size:.7rem}
  code{font-size:.68rem}
}
</style>

<script>
// ─── QUBIT METADATA ────────────────────────────────────────────────────────
const QNAMES = ['q₀','q₁','q₂','q₃','q₄','q₅','q₆','q₇','pf₀','pf₁','pf₂','pf₃','pf₄','pf₅'];
const QDESC  = [
  'Reina 0 · bit 0 (columna LSB)', 'Reina 0 · bit 1 (columna MSB)',
  'Reina 1 · bit 0', 'Reina 1 · bit 1',
  'Reina 2 · bit 0', 'Reina 2 · bit 1',
  'Reina 3 · bit 0 (LSB)', 'Reina 3 · bit 1 (MSB)',
  'Flag conflicto par (0,1)', 'Flag conflicto par (0,2)',
  'Flag conflicto par (0,3)', 'Flag conflicto par (1,2)',
  'Flag conflicto par (1,3)', 'Flag conflicto par (2,3)',
];
const QCOLORS = [
  '#14324A','#2A5278','#0D7377','#0E8C83',
  '#15B899','#2EC4B6','#C8930F','#1E3D5C',
  '#0F9E90','#0B6B6F','#4DD8C0','#20A89A','#14324A','#0D7377'
];

const PAIRS = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
const N=4, K=2;

function queenQubits(i){ return [2*i, 2*i+1]; }
function flagIdx(i,j){ return 8 + PAIRS.findIndex(([a,b])=>a===i&&b===j); }

function getConflicts(d){
  const c=[];
  for(let ci=0;ci<N;ci++) for(let cj=0;cj<N;cj++)
    if(ci===cj||Math.abs(ci-cj)===d) c.push([ci,cj]);
  return c;
}

function matchGates(qIdx,val){
  const g=[];
  for(let b=0;b<K;b++) if(((val>>b)&1)===0) g.push(qIdx[b]);
  return g;
}

function matchDesc(qIdx,val){
  const g=matchGates(qIdx,val);
  return g.length ? g.map(q=>QNAMES[q]).join(', ') : '∅ (sin X)';
}

// ─── BUILD CONFLICT NODE ───────────────────────────────────────────────────
function makeConflict(i,j,qi,qj,fi,ci,cj,d){
  const mi=matchGates(qi,ci), mj=matchGates(qj,cj);
  const reason=ci===cj?'misma columna':`diagonal |${ci}−${cj}|=${d}`;
  return {
    id:`c${i}${j}_${ci}_${cj}`,
    name:`col${i}=${ci}, col${j}=${cj}`,
    sub:reason,
    type:ci===cj?'X':'phase',
    color:ci===cj?'var(--X)':'var(--conflict)',
    qubits:[...qi,...qj,fi],
    desc:`Reina ${i} en col ${ci} y reina ${j} en col ${cj} — conflicto por ${reason}. Activa pf${fi-8}.`,
    stats:[`gates: 5`,`MCX controles: 4`,`tipo: ${reason}`],
    isLeaf:false,
    children:[
      {id:'mp_i_b',name:`match(R${i}=${ci})`,sub:matchDesc(qi,ci)||'∅',type:'X',color:'var(--X)',qubits:qi,
       desc:`apply_match_pattern(reina ${i}, col=${ci}): pone X donde bit=0 para que MCX dispare al detectar el valor ${ci}.`,
       gates:mi.length?mi.map(q=>`X(${QNAMES[q]})`):[`∅ — valor ${ci}=11b, sin X`],isLeaf:true},
      {id:'mp_j_b',name:`match(R${j}=${cj})`,sub:matchDesc(qj,cj)||'∅',type:'X',color:'var(--X)',qubits:qj,
       desc:`apply_match_pattern(reina ${j}, col=${cj}): X en ${matchDesc(qj,cj)}.`,
       gates:mj.length?mj.map(q=>`X(${QNAMES[q]})`):[`∅ — valor ${cj}=11b, sin X`],isLeaf:true},
      {id:'mcx_c',name:`MCX(${[...qi,...qj].map(q=>QNAMES[q]).join(',')} → pf${fi-8})`,sub:'4 controles',type:'MCX',color:'var(--MCX)',qubits:[...qi,...qj,fi],
       desc:`MCX con 4 controles: voltea pf${fi-8} si R${i}=${ci} y R${j}=${cj}. Único estado que pasa el match_pattern.`,
       gates:[`MCX(${[...qi,...qj].map(q=>QNAMES[q]).join(', ')} → ${QNAMES[fi]})`],isLeaf:true},
      {id:'mp_i_a',name:`uncompute(R${i})`,sub:`restaura ${QNAMES[qi[0]]},${QNAMES[qi[1]]}`,type:'X',color:'var(--uncompute)',qubits:qi,
       desc:`Deshace el match_pattern de reina ${i}: aplica X de nuevo en ${matchDesc(qi,ci)} para restaurar el estado original.`,
       gates:mi.length?mi.map(q=>`X(${QNAMES[q]})`):[`∅ — sin X`],isLeaf:true},
      {id:'mp_j_a',name:`uncompute(R${j})`,sub:`restaura ${QNAMES[qj[0]]},${QNAMES[qj[1]]}`,type:'X',color:'var(--uncompute)',qubits:qj,
       desc:`Deshace el match_pattern de reina ${j}.`,
       gates:mj.length?mj.map(q=>`X(${QNAMES[q]})`):[`∅ — sin X`],isLeaf:true},
    ]
  };
}

// ─── BUILD PAIR NODE ───────────────────────────────────────────────────────
function makePair(i,j,rev=false){
  const qi=queenQubits(i), qj=queenQubits(j), fi=flagIdx(i,j), d=j-i;
  const conflicts=getConflicts(d);
  const list=rev?[...conflicts].reverse():conflicts;
  return {
    id:`pair_${i}_${j}${rev?'r':''}`,
    name:`Par (${i},${j})`,
    sub:`${conflicts.length} conflictos · d=${d} · flag=pf${fi-8}${rev?' · UNCOMPUTE':''}`,
    type:'pair',
    color:'var(--pair)',
    qubits:[...qi,...qj,fi],
    desc:`Verifica conflictos entre reina ${i} (${qi.map(q=>QNAMES[q]).join(',')}) y reina ${j} (${qj.map(q=>QNAMES[q]).join(',')}). Distancia de filas d=${d}. El flag pf${fi-8} queda activo si hay conflicto.${rev?' Aplicado en orden INVERSO para uncompute.':''}`,
    stats:[`conflictos: ${conflicts.length}`,`gates/conflicto: 5`,`total: ${conflicts.length*5}`],
    isLeaf:false,
    children:list.map(([ci,cj])=>makeConflict(i,j,qi,qj,fi,ci,cj,d))
  };
}

// ─── CIRCUIT TREE ──────────────────────────────────────────────────────────
const CIRCUIT = {
  id:'root',name:'Grover N=4',
  sub:'N-Reinas · 8 iteraciones · 14 qubits · profundidad: 41.221',
  type:'root',color:'var(--root)',

  grover: `Este es el <em>corazón del algoritmo de Grover</em>. Se repiten 8 veces dos operaciones: el <em>Oráculo</em> (que marca las soluciones invirtiendo su fase) y el <em>Difusor</em> (que amplifica la probabilidad de los estados marcados).<br><br>
<strong>¿Por qué 8 iteraciones?</strong> El número óptimo se calcula como R ≈ π/4 · √(N_total/M) donde N_total=256 (espacio de búsqueda) y M=2 (soluciones). Esto da R ≈ π/4 · √128 ≈ 8. Cada iteración rota el estado θ ≈ 0.177 radianes hacia las soluciones. <em>Si te pasás, la probabilidad baja</em> — Grover tiene un "punto dulce".<br><br>

Internamente tiene 3 etapas en estructura de "sándwich":<br>

• <em>Phase Flip</em>: si TODOS los flags son 0 (sin conflictos), aplica fase −1 usando <code>qc.x(all_flags); qc.h(last); qc.mcx(rest, last); qc.h(last); qc.x(all_flags)</code>.<br>
• <em>Uncompute</em>: deshace el Compute en orden inverso (<code>reversed()</code>) para restaurar los flags a |0⟩.<br><br>

// Explanation for pair nodes (generated dynamically)
function getPairExplanation(nodeId) {
  const m = nodeId.match(/pair_(\d+)_(\d+)(r?)/);
  if (!m) return null;
  const [,i,j,rev] = m;
  const d = j - i;
  if (rev) {
    return `Esta es la etapa de <em>Uncompute</em> del par (${i},${j}). Se aplican las mismas operaciones que en el Compute pero en <em>orden inverso</em>, restaurando el flag pf a |0⟩. Esto es necesario para que las ancillas no queden entrelazadas con los qubits de estado.`;
  }
  return `Aquí se verifican los conflictos entre la <em>reina ${i}</em> (fila ${i}) y la <em>reina ${j}</em> (fila ${j}). La distancia de filas es d=${d}. Para cada par de columnas (cᵢ,cⱼ) que representaría un conflicto (misma columna: cᵢ=cⱼ, o diagonal: |cᵢ−cⱼ|=${d}), se usa <em>match_pattern</em> para preparar los qubits y un <em>MCX</em> para voltear el flag si coincide.`;
}

// Explanation for conflict nodes (generated dynamically)
function getConflictExplanation(nodeId) {
  const m = nodeId.match(/^c(\d)(\d)_(\d)_(\d)$/);
  if (!m) return null;
  const [,i,j,ci,cj] = m;
  const d = j - i;
  const reason = ci === cj ? 'misma columna' : `diagonal (|${ci}−${cj}|=${d})`;
  return `Este bloque verifica un <em>conflicto específico</em>: reina ${i} en columna ${ci} y reina ${j} en columna ${cj} — conflicto por <em>${reason}</em>. El proceso tiene 5 pasos: primero se aplica <em>match_pattern</em> a cada reina (puertas X que preparan los qubits para detectar el valor específico), luego un <em>MCX de 4 controles</em> voltea el flag si ambas reinas coinciden con el patrón, y finalmente se <em>deshace el match_pattern</em> para restaurar los qubits al estado original sin alterar el flag.`;
}

function renderWires(node){
  const wv = document.getElementById('wire-view');
  wv.innerHTML = '';
  const activeQubits = new Set(node.qubits || []);
  const children = node.children || [];

  QNAMES.forEach((name, qi) => {
    if(!activeQubits.has(qi) && node.id !== 'root') {
      if([...activeQubits].length < 14) return; 
    }
    const row = document.createElement('div');
    row.className = 'wire-row';

    const lbl = document.createElement('div');
    lbl.className = 'wname';
    lbl.style.color = activeQubits.has(qi) ? QCOLORS[qi] : 'var(--dim)';
    lbl.textContent = name;
    row.appendChild(lbl);

    const track = document.createElement('div');
    track.className = 'wtrack' + (activeQubits.has(qi) ? ' active' : '');
    
    const gatesDiv = document.createElement('div');
    gatesDiv.className = 'wgates';
    
    const total = children.length + 2;
    children.forEach((child, ci) => {
      if(!child.qubits || !child.qubits.includes(qi)) return;
      const pct = (ci + 1) / total * 100;
      const w = 90 / total;
      const gate = document.createElement('div');
      gate.className = 'wgate';
      gate.style.left = `${pct}%`;
      gate.style.width = `${Math.max(w, 6)}%`;
      gate.style.background = colorOf(child);
      gate.textContent = child.name;
      gate.title = child.name + (child.sub ? ' — ' + child.sub : '');
      gate.style.cursor = child.isLeaf ? 'default' : 'pointer';
      gate.onclick = () => { if(!child.isLeaf) drillInto(child); };
      gatesDiv.appendChild(gate);
    });

    track.appendChild(gatesDiv);
    row.appendChild(track);
    wv.appendChild(row);
  });
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────
function renderBreadcrumb(){
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  navStack.forEach((node, i) => {
    if(i > 0){
      const sep = document.createElement('span');
      sep.className='bcs'; sep.textContent='›';
      bc.appendChild(sep);
    }
    const item = document.createElement('div');
    item.className = 'bci' + (i === navStack.length-1 ? ' active' : '');
    const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colorOf(node)};margin-right:4px"></span>`;
    item.innerHTML = dot + node.name;
    if(i < navStack.length-1){
      item.onclick = () => { navStack = navStack.slice(0,i+1); selectedLeaf=null; render(); };
    }
    bc.appendChild(item);
  });
}

function renderInfoPanel(node){
  const stats = (node.stats||[]);
  const statsArr = Array.isArray(stats) ? stats : Object.entries(stats).map(([k,v])=>`${k}: ${v}`);
  return `
  <div class="ipanel">
    <div class="ibadge" style="background:color-mix(in srgb,${colorOf(node)} 15%,transparent)">${gateTypeLabel(node.type)}</div>
    <div style="flex:1">
      <div class="iname">${node.name} <span style="color:var(--dim);font-weight:400;font-size:.8rem">— ${node.sub||node.type}</span></div>
      <div class="idesc">${node.desc||''}</div>
      <div class="istats">${statsArr.map(s=>`<span class="istat">${s}</span>`).join('')}</div>
    </div>
  </div>`;
}

function renderExplanation(node) {
  // Check for page explanation
  let text = PAGE_EXPLANATIONS[node.id];
  if (!text) text = getPairExplanation(node.id);
  if (!text) text = getConflictExplanation(node.id);
  // Fallback: any non-leaf node uses its desc
  if (!text && !node.isLeaf && node.children && node.children.length > 0 && node.desc) {
    text = node.desc;
  }
  if (!text) return '';

  return `
  <div class="expl-box anim">
    <div class="expl-title">📘 ¿Qué se hace en esta etapa?</div>
    ${text}
  </div>`;
}

function renderQubitLegend() {
  const stateQubits = [
    {name:'q₀', color:QCOLORS[0], desc:'Reina 0 · bit bajo (LSB) de la columna'},
    {name:'q₁', color:QCOLORS[1], desc:'Reina 0 · bit alto (MSB) de la columna'},
    {name:'q₂', color:QCOLORS[2], desc:'Reina 1 · bit bajo'},
    {name:'q₃', color:QCOLORS[3], desc:'Reina 1 · bit alto'},
    {name:'q₄', color:QCOLORS[4], desc:'Reina 2 · bit bajo'},
    {name:'q₅', color:QCOLORS[5], desc:'Reina 2 · bit alto'},
    {name:'q₆', color:QCOLORS[6], desc:'Reina 3 · bit bajo'},
    {name:'q₇', color:QCOLORS[7], desc:'Reina 3 · bit alto'},
  ];
  const flagQubits = [
    {name:'pf₀', color:QCOLORS[8],  desc:'Flag conflicto entre reinas (0,1)'},
    {name:'pf₁', color:QCOLORS[9],  desc:'Flag conflicto entre reinas (0,2)'},
    {name:'pf₂', color:QCOLORS[10], desc:'Flag conflicto entre reinas (0,3)'},
    {name:'pf₃', color:QCOLORS[11], desc:'Flag conflicto entre reinas (1,2)'},
    {name:'pf₄', color:QCOLORS[12], desc:'Flag conflicto entre reinas (1,3)'},
    {name:'pf₅', color:QCOLORS[13], desc:'Flag conflicto entre reinas (2,3)'},
  ];
  let html = `<div class="qlegend anim">`;
  html += `<div class="ql-title">🔌 Qubits de estado (q₀…q₇) — codifican la columna de cada reina en 2 bits binarios</div>`;
  html += `<div class="ql-grid">`;
  stateQubits.forEach(q => {
    html += `<div class="ql-item"><span class="ql-dot" style="background:${q.color}"></span><span class="ql-name">${q.name}</span><span class="ql-desc">${q.desc}</span></div>`;
  });
  html += `</div>`;
  html += `<div class="ql-title" style="margin-top:.9rem">🚩 Qubits flag (pf₀…pf₅) — ancillas que detectan conflictos entre pares de reinas. Valen |1⟩ si hay conflicto, |0⟩ si no.</div>`;
  html += `<div class="ql-grid">`;
  flagQubits.forEach(q => {
    html += `<div class="ql-item"><span class="ql-dot" style="background:${q.color}"></span><span class="ql-name">${q.name}</span><span class="ql-desc">${q.desc}</span></div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderBibliography() {
  return `
  <div class="biblio-box anim">
    <div class="biblio-title">📚 Diferencia con otras implementaciones</div>
    Esta implementación usa <em style="color:var(--gold);font-style:normal;font-weight:500">codificación por columna</em>: cada reina i se fija implícitamente en la fila i y su columna se codifica en k=⌈log₂N⌉ qubits binarios. Esto requiere solo <strong>N·⌈log₂N⌉ qubits de estado</strong> (8 para N=4).
    <br><br>
    En contraste, las implementaciones de <em style="color:var(--gold);font-style:normal;font-weight:500">Jha et al. (2018)</em> y <em style="color:var(--gold);font-style:normal;font-weight:500">Santhosh et al. (2023)</em> usan un <strong>mapeo espacial</strong> con N² qubits (1 por casillero), necesitando 16 qubits para N=4 vs. nuestros 8. Sin embargo, su oráculo tiene menor profundidad ya que las restricciones se verifican localmente.
    <br><br>
    <em style="color:var(--gold);font-style:normal;font-weight:500">Torggler et al. (2019)</em> proponen un enfoque completamente distinto: un simulador cuántico de propósito especial con átomos en redes ópticas, sin usar compuertas discretas.
    <div class="ref">
      Refs: Jha et al., arXiv:1806.10221 (2018) · Santhosh et al., arXiv:2312.16312 (2023) · Torggler et al., Quantum 3, 149 (2019)
    </div>
  </div>`;
}

function renderChildren(node){
  if(!node.children || node.children.length === 0) return '';
  let html = `<div class="section-hdr">Bloques internos — hacé click para entrar</div><div class="grid anim">`;
  node.children.forEach(child => {
    const color = colorOf(child);
    const qBadges = (child.qubits||[]).slice(0,6).map(qi=>
      `<span class="qbadge" style="color:${QCOLORS[qi]};border-color:${QCOLORS[qi]}33;background:${QCOLORS[qi]}11">${QNAMES[qi]}</span>`
    ).join('')+(child.qubits&&child.qubits.length>6?`<span class="qbadge" style="color:var(--dim);border-color:var(--border)">+${child.qubits.length-6}</span>`:'');
    
    html += `
    <div class="gcard${child.isLeaf?' leaf':''}" onclick="${child.isLeaf?`showLeaf('${child.id}')`:`drillInto_id('${child.id}')`}"
         style="border-top:3px solid ${color}">
      <div class="ctop">
        <div class="cicon" style="background:color-mix(in srgb,${color} 20%,transparent);color:${color}">${gateTypeLabel(child.type)}</div>
        ${child.isLeaf?'<span style="color:var(--dim);font-size:.8rem">⊙</span>':'<span class="carr">›</span>'}
      </div>
      <div class="cname">${child.name}</div>
      <div class="csub">${child.sub||child.type}</div>
      <div class="cqubits">${qBadges}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderLeafPanel(node){
  if(!node) return '';
  const gates = node.gates||[];
  return `
  <div class="dpanel anim">
    <h3>⊙ Detalle — ${node.name}</h3>
    <div class="idesc" style="margin-bottom:.9rem">${node.desc||''}</div>
    <div class="gatelist">
      ${gates.map(g=>`<span class="gpill">${g}</span>`).join('')}
    </div>
    ${node.id==='measure' ? renderProbBars() : ''}
  </div>`;
}

function renderProbBars(){
  return `
  <div class="prob-box">
    <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:.7rem">Distribución de medición (4096 shots)</div>
    <div class="prob-row"><span class="prob-lbl">[1, 3, 0, 2] ✅</span>
      <div class="prob-track"><div class="prob-fill" style="width:50%;background:var(--measure)"></div></div>
      <span class="prob-val">~50%</span></div>
    <div class="prob-row"><span class="prob-lbl">[2, 0, 3, 1] ✅</span>
      <div class="prob-track"><div class="prob-fill" style="width:49%;background:var(--measure)"></div></div>
      <span class="prob-val">~49%</span></div>
    <div class="prob-row"><span class="prob-lbl">ruido ❌</span>
      <div class="prob-track"><div class="prob-fill" style="width:1%;background:var(--X)"></div></div>
      <span class="prob-val">~0.7%</span></div>
  </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────
function drillInto(node){
  navStack.push(node);
  selectedLeaf = null;
  render();
}

window.drillInto_id = function(id){
  const node = findNode(id, currentNode());
  if(node) drillInto(node);
};

window.showLeaf = function(id){
  const node = findNode(id, currentNode());
  if(node){ selectedLeaf = node; renderApp(); }
};

function findNode(id, root){
  if(root.id === id) return root;
  for(const c of root.children||[]){
    const f = findNode(id, c);
    if(f) return f;
  }
  return null;
}

function renderApp(){
  const node = currentNode();
  const app = document.getElementById('app');
  let html = '';
  if(navStack.length > 1){
    html += `<div class="back-btn" onclick="goBack()">← Volver a ${navStack[navStack.length-2].name}</div>`;
  }
  html += renderInfoPanel(node);
  html += renderExplanation(node);
  if(node.id === 'root') {
    html += renderQubitLegend();
    html += renderBibliography();
  }
  html += renderChildren(node);
  if(selectedLeaf) html += renderLeafPanel(selectedLeaf);
  app.innerHTML = html;
}

function render(){
  renderBreadcrumb();
  renderWires(currentNode());
  renderApp();
  window.scrollTo({top:0,behavior:'smooth'});
}

window.goBack = function(){
  if(navStack.length > 1){ navStack.pop(); selectedLeaf=null; render(); }
};

// ─── MODAL & BACKEND EXECUTION ─────────────────────────────────────────────
function closeModal() {
  document.getElementById('result-modal').style.display = 'none';
}

async function runBackend(endpoint) {
  const modal = document.getElementById('result-modal');
  const modalBody = document.getElementById('modal-body');
  const modalTitle = document.getElementById('modal-title');
  const btnGrover = document.getElementById('btn-grover');
  const btnQaoa = document.getElementById('btn-qaoa');
  const btnC = document.getElementById('btn-c');
  
  modal.style.display = 'flex';
  modalBody.textContent = `[⏳] Ejecutando código en Azure Functions...\n(Esto tomará unos segundos)\n\nNota: Si esto es una demo y no estás corriendo el backend, fallará.`;
  
  if(endpoint === 'run_grover') modalTitle.textContent = 'Resultado: N-Queens Grover (N=4)';
  else if(endpoint === 'run_qaoa') modalTitle.textContent = 'Resultado: N-Queens QAOA (N=4)';
  else modalTitle.textContent = 'Resultado: N-Queens Clásico C (N=4)';
  
  btnGrover.disabled = true;
  btnQaoa.disabled = true;
  if(btnC) btnC.disabled = true;

  try {
    const API_URL = "https://cuanticabackendapp.azurewebsites.net/api/";
    const response = await fetch(`${API_URL}${endpoint}`);
    if (!response.ok) {
      throw new Error(`Error HTTP: ${response.status}`);
    }
    const text = await response.text();
    modalBody.textContent = text;
  } catch (error) {
    modalBody.textContent = `[❌] Falló la ejecución.\nMotivo: ${error.message}\n\nAsegúrate de que la aplicación esté corriendo a través de Azure Static Web Apps (que levanta la API automáticamente) o usando la SWA CLI localmente.`;
  } finally {
    btnGrover.disabled = false;
    btnQaoa.disabled = false;
    if(btnC) btnC.disabled = false;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────
render();
</script>
